apiVersion: v1
kind: ConfigMap
metadata:
  name: dizal-web-content
  labels:
    app: dizal-web
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>DZL DevOps Platform</title>
      <style>
        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-family: Inter, Arial, sans-serif;
          background:
            radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 35%),
            #07101f;
          color: #e5eefc;
          min-height: 100vh;
        }

        a {
          color: inherit;
          text-decoration: none;
        }

        header {
          padding: 46px 6%;
          border-bottom: 1px solid #23324a;
          background: rgba(11, 22, 40, 0.86);
        }

        .header-content {
          max-width: 1250px;
          margin: auto;
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 30px;
          flex-wrap: wrap;
        }

        h1 {
          margin: 0 0 10px;
          font-size: 42px;
          letter-spacing: -1px;
        }

        .subtitle {
          margin: 0;
          color: #9fb2d0;
          font-size: 17px;
        }

        .cluster-badge {
          padding: 12px 18px;
          border: 1px solid #1e8f62;
          border-radius: 999px;
          background: rgba(16, 185, 129, 0.12);
          color: #6ee7b7;
          font-weight: 700;
        }

        main {
          max-width: 1250px;
          margin: auto;
          padding: 38px 24px 60px;
        }

        .section-title {
          margin: 0 0 18px;
          font-size: 22px;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
          gap: 18px;
          margin-bottom: 38px;
        }

        .card {
          min-height: 180px;
          padding: 24px;
          border: 1px solid #23324a;
          border-radius: 16px;
          background: linear-gradient(145deg, #111d31, #0c1728);
          transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
          transform: translateY(-4px);
          border-color: #3b82f6;
        }

        .card h2 {
          margin: 0 0 10px;
          font-size: 19px;
        }

        .card p {
          min-height: 42px;
          margin: 0 0 18px;
          color: #aebdd3;
          line-height: 1.45;
        }

        .status {
          display: inline-block;
          padding: 6px 11px;
          border-radius: 999px;
          background: #075b43;
          color: #78f0c0;
          font-size: 12px;
          font-weight: 800;
          letter-spacing: 0.4px;
        }

        .link {
          display: block;
        }

        .architecture {
          padding: 26px;
          border: 1px solid #23324a;
          border-radius: 16px;
          background: #0c1728;
        }

        .flow {
          display: flex;
          justify-content: center;
          align-items: center;
          flex-wrap: wrap;
          gap: 12px;
          margin-top: 20px;
        }

        .flow-item {
          padding: 12px 18px;
          border-radius: 10px;
          background: #15243a;
          border: 1px solid #2c405f;
          font-weight: 700;
        }

        .arrow {
          color: #60a5fa;
          font-size: 22px;
        }

        footer {
          padding: 28px;
          text-align: center;
          color: #7386a5;
          border-top: 1px solid #1c2b42;
        }

        @media (max-width: 600px) {
          h1 {
            font-size: 32px;
          }

          .arrow {
            transform: rotate(90deg);
          }
        }

        /* DZL portal enhancements */
        .quick-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 9px;
          align-items: center;
          justify-content: flex-end;
        }

        .quick-action {
          padding: 9px 13px;
          border: 1px solid #304767;
          border-radius: 10px;
          background: #13223a;
          color: #dbeafe;
          font-size: 13px;
          font-weight: 700;
          transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .quick-action:hover {
          transform: translateY(-2px);
          border-color: #60a5fa;
        }

        .platform-summary {
          border-bottom: 1px solid #1f3049;
          background: rgba(11, 23, 41, 0.92);
        }

        .summary-inner {
          max-width: 1250px;
          margin: auto;
          padding: 14px 24px;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 9px;
        }

        .technology-pill {
          padding: 7px 11px;
          border: 1px solid #263b59;
          border-radius: 999px;
          color: #a9bddb;
          background: #0f1c30;
          font-size: 12px;
          font-weight: 700;
        }

        .health-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
          gap: 14px;
          margin-bottom: 38px;
        }

        .health-card {
          padding: 19px;
          border: 1px solid #233750;
          border-radius: 14px;
          background: linear-gradient(145deg, #101e33, #0b1728);
        }

        .health-label {
          color: #8fa4c4;
          font-size: 12px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.7px;
        }

        .health-value {
          margin-top: 9px;
          font-size: 27px;
          font-weight: 800;
          color: #f1f5f9;
        }

        .health-detail {
          margin-top: 5px;
          color: #6ee7b7;
          font-size: 12px;
          font-weight: 700;
        }

        .commit-panel {
          margin-bottom: 38px;
          padding: 19px 22px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 20px;
          flex-wrap: wrap;
          border: 1px solid #233750;
          border-radius: 14px;
          background: #0c182b;
        }

        .commit-title {
          font-size: 12px;
          color: #8fa4c4;
          text-transform: uppercase;
          font-weight: 700;
          letter-spacing: 0.7px;
        }

        .commit-message {
          margin-top: 7px;
          font-size: 15px;
          font-weight: 700;
        }

        .commit-meta {
          color: #8fa4c4;
          font-size: 12px;
        }

        .footer-links {
          margin-top: 12px;
          display: flex;
          justify-content: center;
          flex-wrap: wrap;
          gap: 15px;
        }

        .footer-links a {
          color: #60a5fa;
          font-weight: 700;
        }

        @media (max-width: 760px) {
          .quick-actions {
            justify-content: flex-start;
          }
        }

      </style>
    </head>

    <body>
      <header>
        <div class="header-content">
          <div>
            <h1>DZL DevOps Platform</h1>
            <p class="subtitle">
              Kubernetes home lab with CI/CD, GitOps, observability and security scanning
            </p>
          </div>


          <!-- DZL-PORTAL-ENHANCEMENT-START -->
          <div class="quick-actions">
            <a class="quick-action" href="http://grafana.dzl.ro" target="_blank">Grafana</a>
            <a class="quick-action" href="http://argocd.dzl.ro" target="_blank">Argo CD</a>
            <a class="quick-action" href="http://prometheus.dzl.ro" target="_blank">Prometheus</a>
            <a class="quick-action" href="https://github.com/dizal8/devops-lab" target="_blank">GitHub</a>
            <a class="quick-action" href="https://github.com/dizal8/devops-lab/actions" target="_blank">Actions</a>
          </div>
          <!-- DZL-PORTAL-ENHANCEMENT-END -->

          <div class="cluster-badge">
            ● K3s Cluster Operational
          </div>
        </div>
      
<div class="technology-stack">
<span class="technology-pill">Debian 13</span>
<span class="technology-pill">Docker</span>
<span class="technology-pill">Kubernetes K3s</span>
<span class="technology-pill">Helm</span>
<span class="technology-pill">Terraform</span>
<span class="technology-pill">Traefik</span>
<span class="technology-pill">Argo CD</span>
<span class="technology-pill">Prometheus</span>
<span class="technology-pill">Grafana</span>
<span class="technology-pill">Loki + Alloy</span>
<span class="technology-pill">Trivy</span>
<span class="technology-pill">GitHub Actions</span>
</div>

</header>


      <!-- DZL-PORTAL-ENHANCEMENT-START -->
      <section class="platform-summary">
        <div class="summary-inner">
          <span class="technology-pill">Debian 13</span>
          <span class="technology-pill">Docker</span>
          <span class="technology-pill">Kubernetes K3s</span>
          <span class="technology-pill">Helm</span>
          <span class="technology-pill">Terraform</span>
          <span class="technology-pill">Traefik</span>
          <span class="technology-pill">Argo CD</span>
          <span class="technology-pill">Prometheus</span>
          <span class="technology-pill">Grafana</span>
          <span class="technology-pill">Loki + Alloy</span>
          <span class="technology-pill">Trivy</span>
        </div>
      </section>
      <!-- DZL-PORTAL-ENHANCEMENT-END -->


      <main>
        <h2 class="section-title">Platform capabilities</h2>

        <section class="grid">
          <div class="card">
            <h2>Linux Infrastructure</h2>
            <p>Debian 13 server hosting the container and Kubernetes platform.</p>
            <span class="status">ONLINE</span>
          </div>

          <div class="card">
            <h2>Docker</h2>
            <p>Containerized Nginx application with Docker Compose support.</p>
            <span class="status">ACTIVE</span>
          </div>

          <div class="card">
            <h2>Kubernetes</h2>
            <p>K3s cluster with health probes, resource limits and autoscaling.</p>
            <span class="status">READY</span>
          </div>

          <div class="card">
            <h2>Terraform</h2>
            <p>Infrastructure as Code validation integrated into CI workflows.</p>
            <span class="status">VALIDATED</span>
          </div>

          <div class="card">
            <h2>Helm</h2>
            <p>Reusable application chart with deployment and service templates.</p>
            <span class="status">DEPLOYED</span>
          </div>

          <div class="card">
            <h2>GitHub Actions</h2>
            <p>Automated validation for Terraform, Docker, Kubernetes and Helm.</p>
            <span class="status">PASSING</span>
          </div>

          <a class="card link" href="http://argocd.dzl.ro" target="_blank">
            <h2>Argo CD</h2>
            <p>GitOps deployment with automated synchronization and self-healing.</p>
            <span class="status">SYNCED</span>
          </a>

          <a class="card link" href="http://grafana.dzl.ro" target="_blank">
            <h2>Grafana</h2>
            <p>Dashboards for cluster CPU, memory, workloads and infrastructure.</p>
            <span class="status">MONITORING</span>
          </a>

          <a class="card link" href="http://prometheus.dzl.ro" target="_blank">
            <h2>Prometheus</h2>
            <p>Metrics collection for Kubernetes, nodes, pods and services.</p>
            <span class="status">COLLECTING</span>
          </a>

          <a class="card link" href="http://grafana.dzl.ro/explore" target="_blank">
            <h2>Loki & Alloy</h2>
            <p>Centralized Kubernetes logs collected and queried through Grafana.</p>
            <span class="status">STREAMING</span>
          </a>

          <div class="card">
            <h2>Trivy</h2>
            <p>Container image and Infrastructure as Code security scanning.</p>
            <span class="status">SCANNING</span>
          </div>

          <div class="card">
            <h2>Traefik Ingress</h2>
            <p>Host-based routing for platform applications and observability tools.</p>
            <span class="status">ROUTING</span>
          </div>
        </section>


        <!-- DZL-HEALTH-SECTION-START -->
        <h2 class="section-title">Platform health</h2>

        <section class="health-grid">
          <div class="health-card">
            <div class="health-label">Pods running</div>
            <div class="health-value">29/32</div>
            <div class="health-detail">Kubernetes workloads</div>
          </div>

          <div class="health-card">
            <div class="health-label">Namespaces</div>
            <div class="health-value">7</div>
            <div class="health-detail">Logical environments</div>
          </div>

          <div class="health-card">
            <div class="health-label">Deployments</div>
            <div class="health-value">17</div>
            <div class="health-detail">Managed workloads</div>
          </div>

          <div class="health-card">
            <div class="health-label">Helm releases</div>
            <div class="health-value">6</div>
            <div class="health-detail">Deployed applications</div>
          </div>

          <div class="health-card">
            <div class="health-label">CI pipeline</div>
            <div class="health-value">PASSING</div>
            <div class="health-detail">GitHub Actions</div>
          </div>

          <div class="health-card">
            <div class="health-label">Last refresh</div>
            <div class="health-value" id="portal-time">--:--:--</div>
            <div class="health-detail">Browser local time</div>
          </div>
        </section>

        <section class="commit-panel">
          <div>
            <div class="commit-title">Latest GitHub commit</div>
            <div class="commit-message" id="latest-commit">Loading repository activity...</div>
          </div>

          <div class="commit-meta" id="latest-commit-meta">
            github.com/dizal8/devops-lab
          </div>
        </section>
        <!-- DZL-HEALTH-SECTION-END -->

        <section class="architecture">
          <h2 class="section-title">Delivery architecture</h2>

          <div class="flow">
            <div class="flow-item">GitHub</div>
            <div class="arrow">→</div>
            <div class="flow-item">GitHub Actions</div>
            <div class="arrow">→</div>
            <div class="flow-item">Argo CD</div>
            <div class="arrow">→</div>
            <div class="flow-item">Kubernetes</div>
            <div class="arrow">→</div>
            <div class="flow-item">Observability</div>
          </div>
        </section>
      </main>

      <footer>
        <strong>DZL Platform Engineering Lab</strong><br>
        Built by Mihai Robert Orjanu · Debian · Docker · Kubernetes · Helm · Terraform · GitOps · Observability

        <div class="footer-links">
          <a href="https://github.com/dizal8/devops-lab" target="_blank">GitHub Repository</a>
          <a href="https://github.com/dizal8/devops-lab/actions" target="_blank">CI Workflows</a>
          <a href="http://grafana.dzl.ro" target="_blank">Grafana</a>
          <a href="http://argocd.dzl.ro" target="_blank">Argo CD</a>
        </div>
      </footer>

      <script>
        const platforms = {
          "Linux Infrastructure": {
            link: "http://grafana.dzl.ro/dashboards",
            health: "http://grafana.dzl.ro/api/health"
          },
          "Docker": {
            link: "https://github.com/dizal8/devops-lab/tree/main/docker",
            health: "http://dzl.ro"
          },
          "Kubernetes": {
            link: "http://grafana.dzl.ro/dashboards",
            health: "http://dzl.ro"
          },
          "Terraform": {
            link: "https://github.com/dizal8/devops-lab/tree/main/terraform"
          },
          "Helm": {
            link: "https://github.com/dizal8/devops-lab/tree/main/helm",
            health: "http://dzl.ro"
          },
          "GitHub Actions": {
            link: "https://github.com/dizal8/devops-lab/actions"
          },
          "Argo CD": {
            link: "http://argocd.dzl.ro",
            health: "http://argocd.dzl.ro"
          },
          "Grafana": {
            link: "http://grafana.dzl.ro",
            health: "http://grafana.dzl.ro/api/health"
          },
          "Prometheus": {
            link: "http://prometheus.dzl.ro",
            health: "http://prometheus.dzl.ro/-/ready"
          },
          "Loki & Alloy": {
            link: "http://grafana.dzl.ro/explore",
            health: "http://grafana.dzl.ro/api/health"
          },
          "Trivy": {
            link: "https://github.com/dizal8/devops-lab/actions"
          },
          "Traefik Ingress": {
            link: "http://dzl.ro",
            health: "http://dzl.ro"
          }
        };

        const style = document.createElement("style");
        style.textContent = `
          .card {
            cursor: pointer;
            position: relative;
          }

          .live-indicator {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #64748b;
            box-shadow: 0 0 10px rgba(100, 116, 139, 0.7);
          }

          .live-indicator.online {
            background: #34d399;
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.9);
          }

          .live-indicator.offline {
            background: #f87171;
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.9);
          }

          .live-text {
            margin-top: 12px;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 0.3px;
          }
        `;
        document.head.appendChild(style);

        async function checkService(card, config) {
          const indicator = card.querySelector(".live-indicator");
          const liveText = card.querySelector(".live-text");

          if (!config.health) {
            indicator.className = "live-indicator";
            liveText.textContent = "OPEN REPOSITORY";
            return;
          }

          liveText.textContent = "CHECKING...";

          try {
            await fetch(config.health, {
              mode: "no-cors",
              cache: "no-store"
            });

            indicator.className = "live-indicator online";
            liveText.textContent =
              "LIVE · " + new Date().toLocaleTimeString("ro-RO");
          } catch (error) {
            indicator.className = "live-indicator offline";
            liveText.textContent = "UNREACHABLE";
          }
        }

        document.querySelectorAll(".card").forEach((card) => {
          const title = card.querySelector("h2")?.textContent.trim();
          const config = platforms[title];

          if (!config) return;

          const indicator = document.createElement("span");
          indicator.className = "live-indicator";
          card.appendChild(indicator);

          const liveText = document.createElement("div");
          liveText.className = "live-text";
          liveText.textContent = "INITIALIZING...";
          card.appendChild(liveText);

          card.setAttribute("tabindex", "0");
          card.setAttribute("role", "link");
          card.title = "Open " + title;

          card.addEventListener("click", () => {
            window.open(config.link, "_blank", "noopener,noreferrer");
          });

          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              window.open(config.link, "_blank", "noopener,noreferrer");
            }
          });

          checkService(card, config);
          setInterval(() => checkService(card, config), 15000);
        });
      </script>

    
      <!-- DZL-PORTAL-SCRIPT-START -->
      <script>
        function updatePortalTime() {
          const element = document.getElementById("portal-time");
          if (element) {
            element.textContent = new Date().toLocaleTimeString("ro-RO");
          }
        }

        async function loadLatestCommit() {
          const messageElement = document.getElementById("latest-commit");
          const metaElement = document.getElementById("latest-commit-meta");

          try {
            const response = await fetch(
              "https://api.github.com/repos/dizal8/devops-lab/commits?per_page=1",
              { cache: "no-store" }
            );

            if (!response.ok) {
              throw new Error("GitHub API returned " + response.status);
            }

            const commits = await response.json();
            const commit = commits[0];

            messageElement.textContent =
              commit.commit.message.split("\n")[0];

            const date = new Date(commit.commit.author.date);

            metaElement.textContent =
              commit.sha.slice(0, 7) +
              " · " +
              date.toLocaleString("ro-RO");
          } catch (error) {
            messageElement.textContent =
              "Repository available — commit API temporarily unavailable";

            metaElement.textContent =
              "github.com/dizal8/devops-lab";
          }
        }

        updatePortalTime();
        setInterval(updatePortalTime, 1000);
        loadLatestCommit();
        setInterval(loadLatestCommit, 60000);
      </script>
      <!-- DZL-PORTAL-SCRIPT-END -->

    
<script>
function updateClock(){
const e=document.getElementById("clock");
if(e)e.textContent=new Date().toLocaleTimeString();
}
updateClock();
setInterval(updateClock,1000);
</script>

</body>
    </html>
