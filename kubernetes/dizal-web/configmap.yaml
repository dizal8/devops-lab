apiVersion: v1
kind: ConfigMap
metadata:
  name: dizal-web-content
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>DZL DevOps Platform</title>
      <style>
        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background: #0b1220;
          color: #e5e7eb;
        }

        header {
          padding: 40px;
          background: #111827;
          border-bottom: 1px solid #263244;
        }

        header h1 {
          margin: 0 0 10px;
          font-size: 38px;
        }

        header p {
          margin: 0;
          color: #94a3b8;
        }

        main {
          max-width: 1100px;
          margin: auto;
          padding: 40px 20px;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
          gap: 20px;
        }

        .card {
          background: #111827;
          border: 1px solid #263244;
          border-radius: 12px;
          padding: 24px;
        }

        .card h2 {
          margin-top: 0;
          font-size: 20px;
        }

        .status {
          display: inline-block;
          padding: 6px 10px;
          border-radius: 20px;
          background: #064e3b;
          color: #6ee7b7;
          font-size: 13px;
          font-weight: bold;
        }

        footer {
          text-align: center;
          padding: 30px;
          color: #64748b;
        }
      </style>
    </head>

    <body>
      <header>
        <h1>DZL DevOps Platform</h1>
        <p>Personal DevOps laboratory running on Debian and Kubernetes.</p>
      </header>

      <main>
        <div class="grid">
          <div class="card">
            <h2>Infrastructure</h2>
            <p>Debian Linux Server</p>
            <span class="status">ONLINE</span>
          </div>

          <div class="card">
            <h2>Containers</h2>
            <p>Docker Engine and Docker Compose</p>
            <span class="status">ACTIVE</span>
          </div>

          <div class="card">
            <h2>Kubernetes</h2>
            <p>K3s cluster with replicated workloads</p>
            <span class="status">READY</span>
          </div>

          <div class="card">
            <h2>Infrastructure as Code</h2>
            <p>Terraform-managed laboratory resources</p>
            <span class="status">VALIDATED</span>
          </div>

          <div class="card">
            <h2>Package Management</h2>
            <p>Helm charts and release management</p>
            <span class="status">DEPLOYED</span>
          </div>

          <div class="card">
            <h2>CI/CD</h2>
            <p>GitHub Actions validation pipeline</p>
            <span class="status">ENABLED</span>
          </div>
        </div>
      </main>

      <footer>
        DZL DevOps Lab · Built with Docker, Kubernetes, Helm and Terraform
      </footer>
    </body>
    </html>
