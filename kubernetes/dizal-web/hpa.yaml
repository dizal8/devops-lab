apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dizal-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dizal-web
  minReplicas: 2
  maxReplicas: 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
