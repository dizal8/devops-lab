apiVersion: apps/v1
kind: Deployment
metadata:
  name: dizal-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dizal-web
  template:
    metadata:
      labels:
        app: dizal-web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: web-content
          configMap:
            name: dizal-web-content
