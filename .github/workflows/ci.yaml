name: DevOps Lab CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/first-lab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform format check
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

  docker:
    name: Docker image build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dizal-web:test ./docker/dizal-web

  kubernetes:
    name: Kubernetes YAML validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Kubernetes YAML
        run: |
          for file in kubernetes/dizal-web/*.yaml; do
            echo "Checking $file"
            test -s "$file"
          done

  helm:
    name: Helm chart validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./helm/dizal-web

      - name: Render Helm templates
        run: helm template dizal-web-test ./helm/dizal-web
