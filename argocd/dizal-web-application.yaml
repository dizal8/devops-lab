apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dizal-web
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dizal8/devops-lab.git
    targetRevision: main
    path: kubernetes/dizal-web

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
